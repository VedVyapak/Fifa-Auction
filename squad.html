<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FIFA Auction — Squad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div class="offline-banner">reconnecting · check your wifi</div>

  <header class="bp-chrome bp-squad-chrome">
    <a href="#" id="backLink" class="bp-back-link">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Back to recap
    </a>
    <div class="bp-crumbs" id="crumbs">
      <span id="crumbRoom">Room —</span><span class="sep">/</span>
      <span>Final standings</span><span class="sep">/</span>
      <span class="here" id="crumbName">—</span>
    </div>
    <div style="flex:1"></div>
    <div class="bp-room-chip">
      <span class="label">ROOM</span>
      <span class="code" id="squadRoomCode">----</span>
    </div>
  </header>

  <main class="bp-squad-stage">
    <section class="bp-squad-header">
      <div class="left">
        <div class="bp-rank-block">
          <span class="pos" id="rankPos">—</span>
          <span class="ord">Final rank</span>
        </div>
        <div class="bp-name-block">
          <span class="bp-eyebrow" id="managerSub">Manager · Room —</span>
          <h1 id="managerName">—</h1>
          <div class="row" id="managerChips"></div>
        </div>
      </div>
      <div class="right">
        <span class="bp-head-stat-v ovr" id="headOvr">—</span>
        <span class="bp-head-stat-v" id="headSpent">—</span>
        <span class="bp-head-stat-v left" id="headLeft">—</span>
        <span class="bp-head-stat-l">Avg OVR</span>
        <span class="bp-head-stat-l">Spent</span>
        <span class="bp-head-stat-l">Unspent</span>
      </div>
    </section>

    <div class="bp-squad-grid-wrap">
      <section class="bp-formation-section">
        <div class="bp-formation-tabs" id="formationTabs">
          <button class="active" data-fmt="4-3-3">4-3-3</button>
          <button data-fmt="4-4-2">4-4-2</button>
          <button data-fmt="4-2-3-1">4-2-3-1</button>
          <button data-fmt="3-2-4-1">3-2-4-1</button>
        </div>
        <div class="bp-pitch-wrap">
          <div class="bp-pitch" id="pitch">
            <div class="half-line"></div>
            <div class="center-circle"></div>
            <div class="center-spot"></div>
            <div class="box-top"></div><div class="six-top"></div><div class="pen-spot-top"></div>
            <div class="box-bottom"></div><div class="six-bottom"></div><div class="pen-spot-bottom"></div>
          </div>
        </div>
        <div class="bp-pitch-meta">
          <div>
            <div class="l">Auto-filled positions</div>
            <div class="v"><span id="filledCount">0</span><span style="color:var(--dim);font-size:14px;"> / 11</span></div>
          </div>
          <div>
            <div class="l">Squad slot</div>
            <div class="v green"><span id="squadSlot">0</span><span style="color:var(--dim);font-size:14px;"> / 15</span></div>
          </div>
        </div>
      </section>

      <section class="bp-roster">
        <div>
          <div class="bp-section-head">
            <h2>Position breakdown</h2>
            <span class="meta" id="rosterMeta">— players</span>
          </div>
          <div class="bp-pos-tiles" id="posTiles"></div>
        </div>

        <div>
          <div class="bp-section-head">
            <h2>Roster</h2>
            <span class="meta">grouped by position · sorted by OVR</span>
          </div>
          <div id="rosterGroups" style="display:flex;flex-direction:column;gap:16px;"></div>
        </div>
      </section>
    </div>
  </main>

  <script type="module" src="./js/squad-detail.js"></script>
</body>
</html>
