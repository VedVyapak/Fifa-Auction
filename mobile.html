<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#05070d" />
  <title>FIFA Auction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body class="mobile-body">
  <div class="offline-banner">reconnecting · check your wifi</div>

  <!-- data-state: bidding | leading | idle | locked | finished -->
  <div class="bp-mobile-screen" id="screen" data-state="idle">

    <!-- ============ HEADER ============ -->
    <header class="bp-mobile-header">
      <button class="bp-mobile-hamburger" id="btnOpenDrawer" aria-label="Open squad">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="bp-mobile-me">
        <span class="name" id="bidderName">—</span>
        <span class="conn"><span class="dot" id="connDot"></span><span id="roomLabel">Room —</span></span>
      </div>
      <div class="bp-mobile-budget">
        <span class="num" id="budgetNum">0</span>
        <span class="lbl">Budget</span>
      </div>
    </header>

    <!-- ============ PLAYER CARD (visible in bidding/leading) ============ -->
    <section class="bp-mobile-player" id="playerCard">
      <div class="col-left">
        <div class="meta" id="playerMeta"></div>
        <div class="nm" id="playerNameBlock">
          <span class="first" id="playerFirst"></span>
          <span id="playerLast"></span>
        </div>
        <div class="stats" id="playerStats"></div>
      </div>
      <img class="photo" id="playerPhoto" alt="" />
    </section>

    <!-- ============ BID HERO ============ -->
    <section class="bp-mobile-bid-hero" id="bidHero">
      <div class="row">
        <span class="leader-flag" id="leaderFlag">—</span>
        <span class="timer-num" id="timerNum">0:00</span>
      </div>
      <div class="amt" id="bidAmount">—</div>
      <div class="meta-row">
        <span>Current bid</span>
        <span>·</span>
        <span id="bidAgo">—</span>
        <span>·</span>
        <span id="bidCount">0 bids</span>
      </div>
      <div class="timer-bar"><i id="timerFill"></i></div>
    </section>

    <!-- ============ IDLE STATE ============ -->
    <section class="bp-mobile-idle" id="idleArea">
      <div class="bp-eyebrow" style="margin-bottom:12px;">Standing by</div>
      <div class="bp-idle-title" style="font-size:36px;line-height:1;">Host will pick<br/>the next player.</div>
    </section>

    <!-- ============ LOCKED STATE ============ -->
    <section class="bp-mobile-locked" id="lockedArea">
      <div class="bp-eyebrow" style="color:var(--red);margin-bottom:8px;">You're out</div>
      <div class="reason" id="lockedReason">—</div>
    </section>

    <!-- spacer pushes actions to bottom -->
    <div class="grow"></div>

    <!-- ============ ACTIONS ============ -->
    <div class="bp-mobile-actions" id="actions">
      <div class="warn" id="warning">
        <span class="ico">⚠</span>
        <span class="txt" id="warningText"></span>
      </div>

      <div class="qb-head">
        <span>Quick bid</span>
        <span class="min">next min · <span id="minNextBid">—</span></span>
      </div>
      <div class="qb-grid" id="quickBids">
        <button class="bp-qb" data-delta="100000">+100K</button>
        <button class="bp-qb" data-delta="500000">+500K</button>
        <button class="bp-qb" data-delta="1000000">+1M</button>
        <button class="bp-qb" data-delta="2000000">+2M</button>
      </div>

      <div class="custom-row">
        <input id="customBidInput" placeholder="custom · e.g. 23.5M" inputmode="decimal" />
        <button class="bp-bid-btn" id="btnCustomBid">Bid</button>
      </div>

      <div class="bid-status" id="bidStatus"></div>
    </div>

  </div>

  <!-- ============ DRAWER ============ -->
  <div class="bp-mobile-drawer-backdrop" id="drawerBackdrop"></div>
  <aside class="bp-mobile-drawer" id="drawer">
    <div class="drawer-head">
      <h2>Your squad</h2>
      <button class="drawer-close" id="btnCloseDrawer" aria-label="Close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="drawer-stats">
      <div class="ds"><span class="v" id="dPlayers">0</span><span class="l">Players</span></div>
      <div class="ds gold"><span class="v" id="dSpent">0</span><span class="l">Spent</span></div>
      <div class="ds green"><span class="v" id="dLeft">0</span><span class="l">Left</span></div>
    </div>

    <div class="pos-counts">
      <div class="pc gk"><div class="v" id="dGK">0</div><div class="l">GK</div></div>
      <div class="pc def"><div class="v" id="dDEF">0</div><div class="l">DEF</div></div>
      <div class="pc mid"><div class="v" id="dMID">0</div><div class="l">MID</div></div>
      <div class="pc fwd"><div class="v" id="dFWD">0</div><div class="l">FWD</div></div>
    </div>

    <div class="drawer-tabs" id="drawerTabs">
      <button class="active" data-dtab="list">List</button>
      <button data-dtab="formation" data-fmt="4-3-3">4-3-3</button>
      <button data-dtab="formation" data-fmt="4-4-2">4-4-2</button>
      <button data-dtab="formation" data-fmt="4-2-3-1">4-2-3-1</button>
      <button data-dtab="formation" data-fmt="3-2-4-1">3-2-4-1</button>
    </div>

    <div class="drawer-body">
      <div class="dpanel active" data-dtab="list">
        <div class="bp-mobile-squad-list" id="squadList"></div>
      </div>
      <div class="dpanel" data-dtab="formation">
        <div class="bp-mobile-pitch-wrap">
          <div class="bp-mobile-pitch bp-pitch" id="mobilePitch">
            <div class="half-line"></div>
            <div class="center-circle"></div>
            <div class="box-top"></div><div class="six-top"></div>
            <div class="box-bottom"></div><div class="six-bottom"></div>
          </div>
        </div>
      </div>
    </div>
  </aside>

  <script type="module" src="./js/bidder.js"></script>
</body>
</html>
